<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 148 36" width="148" height="36" role="img" aria-label="Radar">
  <title>Radar</title>
  <!-- Radar icon: concentric arcs + center dot -->
  <!-- Center dot -->
  <circle cx="14" cy="18" r="2.5" fill="#60A5FA"/>
  <!-- Inner arc -->
  <path d="M 8 24 A 8 8 0 0 1 8 12" stroke="#60A5FA" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Outer arc -->
  <path d="M 4 27 A 14 14 0 0 1 4 9" stroke="#60A5FA" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.45"/>
  <!-- Wordmark -->
  <text
    x="32"
    y="24"
    font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="600"
    letter-spacing="-0.5"
    fill="#F8FAFC"
  >Radar</text>
</svg>
